<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; overflow: hidden; }
    #ui {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 100;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      color: white;
    }
    button, select, input {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button { background: #4a90d9; color: white; }
    button:hover { background: #357abd; }
    input, select { background: #333; color: white; }
    #boneSelect {
      width: 350px;
      font-family: monospace;
      font-size: 13px;
    }
    #boneSelect option {
      padding: 5px;
    }
    select[contenteditable] { background: #444; }
    input[type="range"] { width: 200px; }
    input[type="number"] { width: 80px; margin-left: 10px; }
    .row { margin: 10px 0; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    label { display: block; margin-bottom: 5px; font-size: 14px; }
    #zoomControls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 10px;
    }
    #zoomControls button {
      width: 50px;
      height: 50px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 50%;
    }
    #boneNamesPanel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 100;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      color: white;
      width: 400px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    #dropZone {
      border: 2px dashed #4a90d9;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      background: rgba(74, 144, 217, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    #dropZone:hover {
      background: rgba(74, 144, 217, 0.2);
      border-color: #357abd;
    }
    #dropZone.drag-over {
      background: rgba(74, 144, 217, 0.3);
      border-color: #0f0;
      transform: scale(1.02);
    }
    #dropZone label {
      cursor: pointer;
      display: block;
      margin-bottom: 10px;
    }
    #fileInput {
      display: none;
    }
    .drop-hint {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }
    .bone-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px;
      margin: 2px 0;
      background: #333;
      border-radius: 3px;
    }
    .bone-item:hover {
      background: #444;
    }
    .bone-name {
      color: #0f0;
      flex-grow: 1;
      cursor: text;
      user-select: all;
    }
    .bone-copy-btn {
      padding: 3px 8px;
      font-size: 11px;
      margin: 0;
      margin-left: 10px;
    }
    .hierarchy-item {
      margin-left: 20px;
      padding: 3px 5px;
      color: #0f0;
    }
    .hierarchy-root {
      margin-left: 0;
      font-weight: bold;
      color: #0ff;
    }
    .hierarchy-branch {
      border-left: 1px solid #555;
      padding-left: 10px;
      margin-left: 5px;
    }
    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      animation: fadeIn 0.2s ease-in;
    }
    .modal-content {
      background-color: #2a2a2a;
      margin: 15% auto;
      padding: 0;
      border: 1px solid #555;
      border-radius: 8px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      animation: slideDown 0.3s ease-out;
    }
    .modal-header {
      background: #333;
      padding: 15px 20px;
      border-bottom: 1px solid #555;
      border-radius: 8px 8px 0 0;
    }
    .modal-header h3 {
      margin: 0;
      color: #4a90d9;
      font-size: 18px;
    }
    .modal-body {
      padding: 20px;
      color: white;
      line-height: 1.5;
    }
    .modal-body p {
      margin: 0;
      font-size: 14px;
    }
    .modal-footer {
      padding: 15px 20px;
      border-top: 1px solid #555;
      text-align: right;
      background: #1a1a1a;
      border-radius: 0 0 8px 8px;
    }
    .modal-btn {
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .modal-btn-primary {
      background: #4a90d9;
      color: white;
    }
    .modal-btn-primary:hover {
      background: #357abd;
    }
    .modal-btn-secondary {
      background: #555;
      color: white;
    }
    .modal-btn-secondary:hover {
      background: #666;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="row">
      <label>Skeleton Editor:</label>
      <select id="boneSelect">
        <option value="">-- Select Bone --</option>
      </select>
    </div>

    <div class="row">
      <label>Rotation X: <span id="xValue">0°</span></label>
      <div class="slider-row">
        <input type="range" id="xSlider" min="-3.14159" max="3.14159" step="0.01" value="0">
        <input type="number" id="xInput" min="-180" max="180" step="0.1" value="0" placeholder="degrees">
      </div>
    </div>

    <div class="row">
      <label>Rotation Y: <span id="yValue">0°</span></label>
      <div class="slider-row">
        <input type="range" id="ySlider" min="-3.14159" max="3.14159" step="0.01" value="0">
        <input type="number" id="yInput" min="-180" max="180" step="0.1" value="0" placeholder="degrees">
      </div>
    </div>

    <div class="row">
      <label>Rotation Z: <span id="zValue">0°</span></label>
      <div class="slider-row">
        <input type="range" id="zSlider" min="-3.14159" max="3.14159" step="0.01" value="0">
        <input type="number" id="zInput" min="-180" max="180" step="0.1" value="0" placeholder="degrees">
      </div>
    </div>

    <div class="row">
      <button id="resetBoneBtn">Reset Bone</button>
    </div>

    <div class="row">
      <button id="copyBoneBtn">Copy Single Bone</button>
      <button id="pasteBoneBtn">Paste Single Bone</button>
    </div>

    <div class="row" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #555;">
      <label>Skeleton JSON: <span style="color: #4a90d9; font-size: 11px;">(auto-updates model)</span></label>
      <button id="exportSkeletonBtn">Export Skeleton to JSON</button>
      <button id="importSkeletonBtn">Import Skeleton from JSON</button>
      <button id="resetSkeletonBtn">Reset Skeleton</button>
    </div>

    <div class="row">
      <textarea id="skeletonJson" rows="10" style="width: 100%; background: #222; color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; border: 1px solid #555; border-radius: 4px;" placeholder="Skeleton JSON will appear here... (edits auto-apply after 500ms)"></textarea>
    </div>

    <div class="row">
      <button id="copyJsonBtn">Copy JSON to Clipboard</button>
    </div>
  </div>

  <div id="boneNamesPanel">
    <div class="row">
      <div id="dropZone">
        <label for="fileInput">Load GLB File</label>
        <input type="file" id="fileInput" accept=".glb">
        <div class="drop-hint">Click to browse or drag & drop a .glb file here</div>
      </div>
    </div>

    <div class="row" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #555;">
      <label>Animations: <span id="animationIndex" style="color: #4a90d9; font-weight: bold;"></span></label>
      <select id="animationSelect">
        <option value="">-- Select Animation --</option>
      </select>
    </div>

    <div class="row">
      <button id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
    </div>

    <div class="row">
      <label>Rename Animation:</label>
      <input type="text" id="newName" list="savedNames" placeholder="New name">
      <datalist id="savedNames"></datalist>
      <button id="renameBtn">Rename</button>
    </div>

    <div class="row">
      <button id="saveBtn">Save Modified GLB</button>
    </div>

    <div class="row" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #555;">
      <label>Bone Names List:</label>
      <button id="copyAllBoneNamesBtn">Copy All Bone Names</button>
      <button id="refreshBoneListBtn">Refresh List</button>
      <button id="toggleHierarchyBtn">Show Hierarchy</button>
    </div>

    <div class="row">
      <div id="boneNamesList" style="max-height: 300px; overflow-y: auto; background: #222; padding: 10px; border: 1px solid #555; border-radius: 4px; font-family: monospace; font-size: 12px;"></div>
    </div>

    <div class="row">
      <div id="boneHierarchy" style="max-height: 400px; overflow-y: auto; background: #222; padding: 10px; border: 1px solid #555; border-radius: 4px; font-family: monospace; font-size: 12px; display: none;"></div>
    </div>
  </div>

  <div id="zoomControls">
    <button id="zoomInBtn">+</button>
    <button id="zoomOutBtn">-</button>
  </div>

  <!-- Modal Dialog -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Message</h3>
      </div>
      <div class="modal-body">
        <p id="modalMessage"></p>
      </div>
      <div class="modal-footer">
        <button id="modalConfirm" class="modal-btn modal-btn-primary">OK</button>
        <button id="modalCancel" class="modal-btn modal-btn-secondary" style="display: none;">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
